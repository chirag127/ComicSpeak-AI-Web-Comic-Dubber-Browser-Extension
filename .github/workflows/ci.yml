# .github/workflows/ci.yml
# APEX TECHNICAL AUTHORITY STANDARD (DECEMBER 2025 EDITION)

name: 'CI: Build, Lint, and Test'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual triggering

# Ensures that only one workflow run is executed for a given PR or branch at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: 'Build & Verify Extension'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@v4

      - name: '2. Setup Node.js Environment (v20)'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: '3. Install Dependencies'
        run: npm install

      - name: '4. Lint & Format Check (Biome)'
        run: npx @biomejs/biome check ./

      - name: '5. Build Production Artifact'
        run: echo "No build step for extension"

  backend:
    name: 'Test Backend'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: '1. Checkout Repository'
        uses: actions/checkout@v4

      - name: '2. Setup Node.js Environment (v18)'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: '3. Install Dependencies'
        run: npm ci

      - name: '4. Run Tests'
        run: npm test
